<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product preview card component</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <main id="product-card-component">
    <div>
      <img class="mobile-image" src="images/image-product-mobile.jpg" alt="Chanel perfume">
      <img class="desktop-image" src="images/image-product-desktop.jpg" alt="Chanel perfume">
    </div>
    <div class="product-card">
      <p class="product-category">Perfume</p>

      <h1 class="product-heading">Gabrielle Essence Eau De Parfum</h1>

      <p class="product-text">A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>

      <p class="product-rate"><span class="current-rate">$149.99</span>
      <span class="previous-rate">$169.99</span></p>

      <button class="cta" type="button">Add to Cart</button>
    </div>
  </main>

</body>

</html>
